version: '3'
services:
  prometheus:
    image: prom/prometheus
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml"
    networks:
      - localprom
    ports:
      - 9090:9090
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  localprom:
    name: monitoring_localprom
    driver: bridge
