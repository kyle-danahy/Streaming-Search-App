version: "3.8"

# Connects to Postgres started from ../database/docker-compose.yaml.
# Start the database first:  cd ../database && docker compose up -d

services:
  data_collector:
    build:
      context: ../..
      dockerfile: src/data_collector/Dockerfile
    networks:
      - flask_app_network
    environment:
      POSTGRES_USER: flaskuser
      POSTGRES_PASSWORD: flaskpass
      POSTGRES_DB: flaskdb
      DATABASE_URL: postgresql://flaskuser:flaskpass@localhost:5432/flaskdb
      WATCHMODE_API_KEY: ${WATCHMODE_API_KEY:-Ueg5Sw7ZedERgV0pzRjKdPa30qCteVX9Iua6QtQc}

networks:
  flask_app_network:
    external: true
    name: flask_app_network
